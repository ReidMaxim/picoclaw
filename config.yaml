{
  "agents": {
    "defaults": {
      "workspace": "~/.picoclaw/workspace",
      "restrict_to_workspace": true,
      "model": "stepfun/step-3.5-flash:free",
      "max_tokens": 2048,
      "temperature": 0.2,
      "max_tool_iterations": 5,
      "presence_penalty": 0,
      "frequency_penalty": 0
    }
  },
  "providers": {
    "openrouter": {
      "api_key": "",
      "api_base": "https://openrouter.ai/api/v1",
      "max_results": 5
    }
  },
  "cron": {
    "exec_timeout_minutes": 30
  },
  "heartbeat": {
    "enabled": true,
    "interval": 30
  }
}
